{% load static %}
<nav id="main-navbar" class="fixed top-0 left-0 right-0 z-40 bg-slate-900/95 glass border-b border-slate-700/50 transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center gap-3 group">
        <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center shadow-lg group-hover:shadow-glow transition-all duration-300">
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
          </svg>
        </div>
        <span class="text-white font-display font-bold text-lg">ColorsEvent</span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-7">
        <a href="{% url 'hero' %}" class="nav-link text-slate-300 hover:text-white text-sm font-medium transition-colors">Events</a>
        <a href="{% url 'dashboard' %}" class="nav-link text-slate-300 hover:text-white text-sm font-medium transition-colors">Dashboard</a>
        <a href="{% url 'group-list' %}" class="nav-link text-slate-300 hover:text-white text-sm font-medium transition-colors">Groups</a>
        <a href="{% url 'about' %}" class="nav-link text-slate-300 hover:text-white text-sm font-medium transition-colors">About</a>
        <a href="{% url 'contact' %}" class="nav-link text-slate-300 hover:text-white text-sm font-medium transition-colors">Contact</a>
      </div>

      <!-- User Menu -->
      <div class="flex items-center gap-4">
        <!-- Create Event Quick Button -->
        <a href="{% url 'create-event' %}" class="hidden md:flex items-center gap-2 btn-amber text-white text-sm font-semibold px-4 py-2 rounded-lg shadow-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          New Event
        </a>

        <!-- Avatar Dropdown -->
        <div class="relative">
          <button id="user-menu-button" class="flex items-center gap-2 group p-1 rounded-xl hover:bg-slate-800 transition-all">
            <div class="relative">
              <img class="h-9 w-9 rounded-xl object-cover ring-2 ring-primary-500/30 group-hover:ring-primary-500 transition-all"
                   src="{{ user.profile_image.url }}" alt="{{ user.username }}" 
                   onerror="this.src='https://ui-avatars.com/api/?name={{ user.username }}&background=7c3aed&color=fff&size=36'"/>
              <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-slate-900 rounded-full"></span>
            </div>
            <span class="hidden md:block text-slate-300 text-sm font-medium">{{ user.username }}</span>
            <svg class="hidden md:block w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <div id="user-menu" class="absolute right-0 mt-2 w-56 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl py-2 hidden animate-fade-in">
            <div class="px-4 py-3 border-b border-slate-700">
              <p class="text-white font-semibold text-sm">{{ user.get_full_name|default:user.username }}</p>
              <p class="text-slate-400 text-xs mt-0.5">{{ user.email }}</p>
            </div>
            <div class="py-1">
              <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:text-white hover:bg-slate-700 text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"/></svg>
                Dashboard
              </a>
              <a href="{% url 'profile' %}" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:text-white hover:bg-slate-700 text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                My Profile
              </a>
              <a href="{% url 'create-group' %}" class="flex items-center gap-3 px-4 py-2.5 text-slate-300 hover:text-white hover:bg-slate-700 text-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Create Group
              </a>
            </div>
            <div class="border-t border-slate-700 pt-1">
              <form method="post" action="{% url 'sign-out' %}">
                {% csrf_token %}
                <button class="flex items-center gap-3 w-full px-4 py-2.5 text-red-400 hover:text-red-300 hover:bg-slate-700 text-sm transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                  Sign Out
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Mobile Toggle -->
        <button id="menu-toggle" class="md:hidden text-slate-300 hover:text-white p-2 rounded-lg hover:bg-slate-800 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="md:hidden hidden pb-4 border-t border-slate-700 mt-2 pt-4">
      <div class="flex flex-col gap-1">
        <a href="{% url 'hero' %}" class="text-slate-300 hover:text-white hover:bg-slate-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-all">Browse Events</a>
        <a href="{% url 'dashboard' %}" class="text-slate-300 hover:text-white hover:bg-slate-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-all">Dashboard</a>
        <a href="{% url 'group-list' %}" class="text-slate-300 hover:text-white hover:bg-slate-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-all">Groups</a>
        <a href="{% url 'about' %}" class="text-slate-300 hover:text-white hover:bg-slate-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-all">About</a>
        <a href="{% url 'contact' %}" class="text-slate-300 hover:text-white hover:bg-slate-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-all">Contact</a>
        <a href="{% url 'create-event' %}" class="mt-2 mx-4 text-center btn-amber text-white px-4 py-2.5 rounded-lg text-sm font-semibold">+ Create Event</a>
      </div>
    </div>
  </div>
</nav>
<div class="h-16"></div>
