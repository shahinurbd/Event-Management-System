{% extends "base.html" %}
{% block title %}Access Denied — ColorsEvent{% endblock %}
{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-6 py-20">
  <div class="text-center max-w-md">
    <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-8">
      <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <h1 class="font-display font-extrabold text-4xl text-slate-800 mb-4">Access Denied</h1>
    <p class="text-slate-500 text-lg leading-relaxed mb-8">
      You don't have permission to access this page. Please contact an administrator if you think this is a mistake.
    </p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{% url 'home' %}" class="btn-primary text-white font-semibold px-8 py-3.5 rounded-xl">
        Go Home
      </a>
      <a href="{% url 'contact' %}" class="text-slate-500 hover:text-slate-700 font-medium px-8 py-3.5 rounded-xl border border-slate-200 hover:border-slate-300 transition-all">
        Contact Support
      </a>
    </div>
  </div>
</div>

{% endblock content %}
